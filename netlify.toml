[[redirects]]
  from = "https://gbdesign.it/*"
  to = "https://www.gbdesign.it/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/deploy"
  to = "/.netlify/functions/deploy"
  status = 200

[build]
  command = "node scripts/inject-cms-config.mjs && npm run build"
  publish = "dist"
  # Salta il build per i commit del CMS (Decap scrive "Create …" / "Update …" / "Delete …").
  # I build hook (pulsante "Manda in produzione") ignorano questo campo e buildano sempre.
  ignore = "node -e \"const m=require('child_process').execSync('git log -1 --pretty=%B').toString().trim(); process.exit(/^(Create|Update|Delete|Upload) /.test(m) ? 0 : 1);\""

[build.environment]
  NODE_VERSION = "22"

# Cache aggressiva per gli asset versionati
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: cache breve per aggiornamenti frequenti
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Headers di sicurezza per tutte le pagine
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.netlify.com; upgrade-insecure-requests"

# Pannello CMS admin — CSP permissiva (Decap CMS + Netlify Identity CDN)
# DEVE stare DOPO /* perché su Netlify vince l'ultima regola che fa match sullo stesso header
[[headers]]
  for = "/admin*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://unpkg.com https://identity.netlify.com https://cdn.jsdelivr.net https://media-library.cloudinary.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; font-src 'self' data: https://unpkg.com https://cdn.jsdelivr.net; connect-src 'self' https://*.netlify.com https://api.netlify.com https://identity.netlify.com https://api.github.com https://raw.githubusercontent.com https://media.githubusercontent.com https://*.cloudinary.com; worker-src blob: 'self'; frame-src 'self' https://identity.netlify.com https://media-library.cloudinary.com https://console.cloudinary.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.netlify.com;"
