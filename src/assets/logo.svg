<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#bf282b"/>
  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="197" height="197" rx="18.5" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Top accent bars -->
  <rect x="18" y="17" width="44" height="3.5" rx="1.75" fill="white" fill-opacity="0.35"/>
  <rect x="18" y="24" width="28" height="3.5" rx="1.75" fill="white" fill-opacity="0.2"/>

  <!-- GB monogram -->
  <text
    x="100" y="118"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="90"
    letter-spacing="-3"
    fill="white"
  >GB</text>

  <!-- Divider -->
  <rect x="26" y="132" width="148" height="1.5" rx="0.75" fill="white" fill-opacity="0.25"/>

  <!-- Tagline -->
  <text
    x="103" y="157"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, Helvetica, sans-serif"
    font-weight="300"
    font-size="13"
    letter-spacing="8"
    fill="white"
    fill-opacity="0.85"
  >DESIGN</text>

  <!-- Bottom accent bars (mirrored) -->
  <rect x="138" y="176" width="44" height="3.5" rx="1.75" fill="white" fill-opacity="0.35"/>
  <rect x="154" y="169" width="28" height="3.5" rx="1.75" fill="white" fill-opacity="0.2"/>
</svg>
